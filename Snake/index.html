<!doctype html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="使用方向鍵或 WASD 操作的貪食蛇遊戲。">
  <title>森林貪食蛇</title>
  <style>
    :root{--ink:#f5f7f1;--muted:#afc2b3;--panel:#17241d;--line:#355443;--accent:#ffd166}
    *{box-sizing:border-box}
    body{min-height:100vh;margin:0;padding:28px 18px;color:var(--ink);background:radial-gradient(circle at top,#294936 0,#101914 55%,#080d0a 100%);font-family:"Microsoft JhengHei",system-ui,sans-serif;text-align:center}
    main{width:min(100%,520px);margin:auto}
    h1{margin:0 0 4px;font-size:clamp(1.8rem,7vw,2.7rem)}
    .subtitle{margin:0 0 18px;color:var(--muted)}
    .scoreboard{display:flex;justify-content:center;gap:12px;margin-bottom:14px}
    .scoreboard p{min-width:130px;margin:0;padding:9px 14px;color:#dfe9e1;background:rgba(23,36,29,.9);border:1px solid var(--line);border-radius:99px;font-weight:800}
    .game-frame{position:relative;width:min(100%,400px);margin:auto;padding:8px;background:linear-gradient(145deg,#6b9c72,#284d37);border:1px solid #7fb488;border-radius:18px;box-shadow:0 20px 55px rgba(0,0,0,.45)}
    canvas{display:block;width:100%;height:auto;background:#0d1711;border-radius:11px}
    .help{margin:16px 0 12px;color:var(--muted);font-size:.92rem}
    #Start{padding:10px 18px;color:#30230a;background:var(--accent);border:0;border-radius:9px;font:800 1rem "Microsoft JhengHei",system-ui,sans-serif;cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,.25)}
    #Start:hover{background:#ffe092;transform:translateY(-1px)}
    #Start:focus-visible{outline:3px solid #fff;outline-offset:3px}
    @media(max-width:420px){body{padding:20px 12px}.scoreboard{gap:7px}.scoreboard p{min-width:0;flex:1;font-size:.92rem}}
  </style>
</head>
<body>
  <main>
    <h1>森林貪食蛇</h1>
    <p class="subtitle">吃下蘋果，讓小蛇慢慢長大</p>
    <div class="scoreboard" aria-live="polite">
      <p id="myScore">遊戲分數：0</p>
      <p id="myHighestScore">最高分數：0</p>
    </div>
    <div class="game-frame">
      <canvas id="myCanvas" width="320" height="320" aria-label="貪食蛇遊戲區域"></canvas>
    </div>
    <p class="help">使用方向鍵或 W、A、S、D 操作；按空白鍵可暫停。</p>
    <button type="button" id="Start">開始新遊戲</button>
  </main>
  <script src="./content.js"></script>
</body>
</html>
