<!doctype html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="共五個關卡的星際翻牌記憶配對遊戲。">
  <title>星際翻牌配對</title>
  <style>
    :root{--ink:#f7f8ff;--muted:#b4bddb;--panel:rgba(17,24,55,.82);--line:rgba(136,156,232,.28);--cyan:#65e4ff;--violet:#9577ff;--gold:#ffd166}
    *{box-sizing:border-box}
    body{min-height:100vh;margin:0;padding:26px 16px;color:var(--ink);background:radial-gradient(circle at 15% 10%,#27397b 0,transparent 30%),radial-gradient(circle at 85% 80%,#462b76 0,transparent 27%),linear-gradient(145deg,#070b1b,#101735 58%,#080c1d);font-family:"Microsoft JhengHei",system-ui,sans-serif;text-align:center;overflow-x:hidden}
    body::before{content:"";position:fixed;inset:0;pointer-events:none;background-image:radial-gradient(circle,#fff 0 1px,transparent 1.3px);background-size:47px 47px;opacity:.12}
    main{position:relative;width:min(100%,980px);margin:auto}
    .eyebrow{margin:0 0 4px;color:var(--cyan);font-size:.75rem;font-weight:900;letter-spacing:.2em;text-transform:uppercase}
    h1{margin:0;font-size:clamp(2rem,7vw,3.4rem);line-height:1.15;letter-spacing:-.035em}
    .subtitle{margin:7px 0 18px;color:var(--muted)}
    .hud{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;margin-bottom:13px}
    .stat{padding:10px 12px;background:var(--panel);border:1px solid var(--line);border-radius:13px;backdrop-filter:blur(9px)}
    .stat span{display:block;color:var(--muted);font-size:.75rem}.stat strong{display:block;margin-top:2px;font-size:1.12rem}
    .progress{height:7px;margin-bottom:16px;background:#171e42;border-radius:99px;overflow:hidden}.progress span{display:block;width:20%;height:100%;background:linear-gradient(90deg,var(--cyan),var(--violet));border-radius:inherit;transition:width .4s ease}
    .board{display:grid;grid-template-columns:repeat(auto-fit,minmax(92px,1fr));gap:clamp(9px,1.8vw,16px);width:min(100%,900px);margin:auto;padding:clamp(14px,2.5vw,22px);background:var(--panel);border:1px solid var(--line);border-radius:22px;box-shadow:0 25px 80px rgba(0,0,0,.42);perspective:1000px}
    .card{position:relative;aspect-ratio:4/5;min-width:0;padding:0;background:none;border:0;border-radius:16px;cursor:pointer;perspective:900px;-webkit-tap-highlight-color:transparent}
    .card-inner{position:absolute;inset:0;transform-style:preserve-3d;transition:transform .48s cubic-bezier(.2,.75,.3,1)}
    .card.flipped .card-inner,.card.matched .card-inner{transform:rotateY(180deg)}
    .card-face{position:absolute;inset:0;display:grid;place-items:center;border-radius:16px;backface-visibility:hidden;-webkit-backface-visibility:hidden;overflow:hidden}
    .card-back{background:radial-gradient(circle at 50% 40%,rgba(101,228,255,.18),transparent 29%),linear-gradient(145deg,#293b85,#151d4d 56%,#442d75);border:2px solid rgba(151,169,255,.5);box-shadow:0 10px 24px rgba(0,0,0,.3),inset 0 0 18px rgba(105,220,255,.12)}
    .card-back::before{content:"✦";display:grid;place-items:center;width:48%;aspect-ratio:1;color:#bbf6ff;border:2px solid rgba(187,246,255,.65);border-radius:50%;font-size:clamp(1.2rem,4vw,2rem);box-shadow:0 0 18px rgba(101,228,255,.35)}
    .card-back::after{content:"";position:absolute;inset:7px;border:1px solid rgba(255,255,255,.16);border-radius:11px}
    .card-front{transform:rotateY(180deg);background:radial-gradient(circle at 45% 32%,#fff 0,rgba(255,255,255,.25) 8%,transparent 32%),linear-gradient(145deg,hsl(var(--hue),88%,65%),hsl(var(--hue),72%,38%));border:2px solid rgba(255,255,255,.72);box-shadow:inset 0 0 25px rgba(255,255,255,.23)}
    .symbol{filter:drop-shadow(0 5px 7px rgba(0,0,0,.3));font-size:clamp(2rem,7vw,4rem);line-height:1;transform:translateY(-2px)}
    .card:hover:not(.matched) .card-inner{translate:0 -3px}.card:focus-visible{outline:3px solid var(--gold);outline-offset:4px}.card.matched{cursor:default}.card.matched .card-front{animation:matched .55s ease}.card.matched::after{content:"✓";position:absolute;z-index:3;top:7px;right:7px;display:grid;place-items:center;width:25px;height:25px;color:#183525;background:#9ff6b8;border-radius:50%;font-weight:900;transform:rotateY(180deg)}
    .actions{display:flex;justify-content:center;align-items:center;flex-wrap:wrap;gap:10px;margin-top:17px}.hint{margin:0;color:var(--muted);font-size:.9rem}.action-button{min-height:42px;padding:9px 16px;color:#121831;background:linear-gradient(135deg,var(--cyan),#b098ff);border:0;border-radius:10px;font:900 .95rem "Microsoft JhengHei",system-ui,sans-serif;cursor:pointer}.action-button:hover{filter:brightness(1.08)}
    .overlay{position:fixed;z-index:20;inset:0;display:grid;place-items:center;padding:18px;background:rgba(4,7,19,.74);backdrop-filter:blur(8px)}.overlay[hidden]{display:none}.dialog{width:min(100%,430px);padding:30px;background:linear-gradient(145deg,#172252,#241a4e);border:1px solid #5e70be;border-radius:22px;box-shadow:0 25px 90px rgba(0,0,0,.55)}.dialog .icon{font-size:3rem}.dialog h2{margin:7px 0;font-size:1.8rem}.dialog p{margin:0 0 20px;color:var(--muted)}
    .ranking-form{display:grid;gap:10px}.ranking-form[hidden],.ranking-view[hidden]{display:none}.ranking-form label{color:var(--muted);font-size:.9rem}.ranking-form input{width:100%;height:45px;padding:0 13px;color:var(--ink);background:#0c1230;border:1px solid #6170b2;border-radius:10px;font:inherit}.ranking{margin:12px 0 17px;padding:0;list-style:none;text-align:left}.ranking li{display:grid;grid-template-columns:38px 1fr auto;gap:8px;padding:8px 4px;border-bottom:1px solid rgba(145,158,219,.2)}.ranking .rank{color:var(--gold);font-weight:900}.ranking .time{color:#aaf5ff;font-weight:900}.ranking-note{font-size:.86rem}
    @keyframes matched{50%{transform:rotateY(180deg) scale(1.08);filter:brightness(1.3)}}
    @media(max-width:680px){body{padding:20px 10px}.hud{grid-template-columns:repeat(2,1fr)}.board{grid-template-columns:repeat(4,minmax(0,1fr));padding:11px;border-radius:16px}.card-face{border-radius:12px}.symbol{font-size:clamp(1.8rem,10vw,3rem)}}
    @media(max-width:430px){.board{grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}.subtitle{font-size:.9rem}.stat{padding:7px}.card-back::before{font-size:1.2rem}.actions{align-items:stretch}.hint{width:100%}}
    @media(prefers-reduced-motion:reduce){.card-inner{transition:none}.card.matched .card-front{animation:none}.progress span{transition:none}}
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Memory Mission</p>
    <h1>星際翻牌配對</h1>
    <p class="subtitle">記住每個星球的位置，找出所有相同圖案</p>
    <section class="hud" aria-label="遊戲資訊">
      <div class="stat"><span>目前關卡</span><strong id="level">1 / 5</strong></div>
      <div class="stat"><span>本關卡牌</span><strong id="card-count">6 張</strong></div>
      <div class="stat"><span>總分</span><strong id="score">0</strong></div>
      <div class="stat"><span>翻牌次數</span><strong id="moves">0</strong></div>
      <div class="stat"><span>遊戲時間</span><strong id="timer">00:00.0</strong></div>
    </section>
    <div class="progress" aria-label="關卡進度"><span id="progress-bar"></span></div>
    <section id="board" class="board" aria-label="翻牌遊戲區"></section>
    <div class="actions"><p id="status" class="hint" aria-live="polite">請翻開兩張卡牌</p><button id="restart" class="action-button" type="button">重新開始</button></div>
  </main>

  <section id="overlay" class="overlay" hidden>
    <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="result-title">
      <div id="result-icon" class="icon">🚀</div>
      <h2 id="result-title">關卡完成！</h2>
      <p id="result-message"></p>
      <button id="next-level" class="action-button" type="button">進入下一關</button>
      <form id="ranking-form" class="ranking-form" hidden>
        <label for="player-name">輸入名字，登記完成時間</label>
        <input id="player-name" name="playerName" maxlength="12" autocomplete="nickname" placeholder="玩家名字" required>
        <button class="action-button" type="submit">加入排行榜</button>
      </form>
      <div id="ranking-view" class="ranking-view" hidden>
        <p class="ranking-note">完成時間越少，排名越前面。排行榜保存在這台裝置。</p>
        <ol id="ranking" class="ranking"></ol>
        <button id="play-again" class="action-button" type="button">重新挑戰五關</button>
      </div>
    </div>
  </section>
  <script src="content.js"></script>
</body>
</html>
